# Application Name
spring.application.name=Zikr-ul-Quran

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/qiraat_app
spring.datasource.username=root
spring.datasource.password=data123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration (for audio files)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# CORS Configuration for React Frontend
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Server Configuration
server.port=8080

# Audio Files Path Configuration
app.audio.base-path=../Audio/

# Logging
logging.level.com.zikrulquran=DEBUG
logging.level.org.hibernate.SQL=DEBUG